<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyovT Neon Wheel - Pro</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: radial-gradient(#10101a, #000);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        /* Թայմեր */
        .timer-container {
            background: rgba(20, 20, 30, 0.6);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }

        .timer-display {
            font-size: 32px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #f1c40f;
        }

        .timer-inputs input {
            width: 45px;
            padding: 5px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .timer-btn {
            background: #f1c40f;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
        }

        #result-text {
            font-size: 24px;
            margin-bottom: 20px;
            color: #fff;
            height: 35px;
            font-weight: bold;
            text-shadow: 0 0 15px #fff;
            text-align: center;
        }

        /* Անիվի հատված */
        .wheel-section {
            position: relative;
            width: 310px;
            height: 310px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 30px;
            background: #ff4757;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
        }

        #wheel-wrapper {
            width: 300px;
            height: 300px;
            position: relative;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid #f1c40f;
            box-shadow: 0 0 20px #f1c40f;
        }

        .idle-spin { animation: idleRotate 20s linear infinite; }
        @keyframes idleRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #wheel { width: 100%; height: 100%; border-radius: 50%; }

        #spin-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55px; height: 55px;
            background: #f1c40f;
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            z-index: 35;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            border: 2px solid #fff;
        }

        /* Ձվիկների Popup */
        #egg-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .egg-box {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #f1c40f;
            text-align: center;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.4);
            width: 95%;
            max-width: 380px;
            box-sizing: border-box;
        }

        .egg-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 30px;
            height: 140px;
            position: relative;
            width: 100%;
        }

        .egg {
            width: 80px;
            height: 110px;
            background: radial-gradient(circle at 30% 30%, #f1c40f, #d4ac0d);
            border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 26px;
            font-weight: bold;
            color: #000;
            border: 2px solid #fff;
            transition: 0.3s;
        }

        @keyframes pulseEgg {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 15px #f1c40f; }
            100% { transform: scale(1); }
        }
        .pulse { animation: pulseEgg 1s ease-in-out infinite; }

        @keyframes shuffleMove {
            0% { transform: translateX(-40px); }
            50% { transform: translateX(40px); }
            100% { transform: translateX(-40px); }
        }
        .shuffling { animation: shuffleMove 0.5s linear infinite; }

        .egg.open {
            background: #fff;
            color: #e74c3c;
            transform: scale(1.2) !important;
            box-shadow: 0 0 25px #fff;
            z-index: 10;
        }

        /* Մենյու */
        .menu-container {
            background: rgba(20, 20, 30, 0.6);
            padding: 15px;
            border-radius: 15px;
            width: 95%;
            max-width: 380px;
            box-sizing: border-box;
        }

        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 5px; border: none; background: rgba(0,0,0,0.4); color: white; }
        .add-btn { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .shuffle-btn { background: #3498db; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; width: 100%; }
        
        .item-list { max-height: 150px; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .item-list li {
            background: rgba(255,255,255,0.05);
            margin-bottom: 5px; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 6px;
            font-size: 14px;
        }
        .del-btn { background: #ff4757; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="timer-display" id="display">00:00</div>
        <div class="timer-inputs">
            <input type="number" id="min" placeholder="Ր"> :
            <input type="number" id="sec" placeholder="Վ">
            <button class="timer-btn" onclick="startTimer()">ՍԿՍԵԼ</button>
            <button class="timer-btn" style="background:#95a5a6" onclick="resetTimer()">R</button>
        </div>
    </div>

    <div id="result-text">Tiktok LyovT</div>

    <div class="wheel-section">
        <div class="arrow"></div>
        <div id="spin-btn">GO</div>
        <div id="wheel-wrapper" class="idle-spin">
            <canvas id="wheel" width="500" height="500"></canvas>
        </div>
    </div>

    <div id="egg-overlay">
        <div class="egg-box">
            <h1 id="egg-winner-name" style="color: #f1c40f; margin: 0; font-size: 26px; word-wrap: break-word;"></h1>
            <h2 id="egg-status" style="margin-top: 5px; font-size: 18px;">Հաղթեց!</h2>
            <div class="egg-container">
                <div class="egg" id="egg-0" onclick="pickEgg(0)">?</div>
                <div class="egg" id="egg-1" onclick="pickEgg(1)">?</div>
            </div>
            <button class="timer-btn" style="margin-top:30px; padding: 12px 30px; display:none;" id="close-egg" onclick="closeEggGame()">ՓԱԿԵԼ</button>
        </div>
    </div>

    <div class="menu-container">
        <div class="input-group">
            <input type="text" id="new-item" placeholder="Անուն կամ 'Անուն 5.'">
            <button class="add-btn" onclick="addItem()">+</button>
        </div>
        <button class="shuffle-btn" onclick="shuffleItems()">🔀 ԽԱՌՆԵԼ ՑՈՒՑԱԿԸ</button>
        <ul class="item-list" id="item-list"></ul>
    </div>

    <audio id="spin-sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const wheelWrapper = document.getElementById('wheel-wrapper');
        const spinBtn = document.getElementById('spin-btn');
        const resultText = document.getElementById('result-text');
        const itemListElement = document.getElementById('item-list');
        const spinSound = document.getElementById('spin-sound');

        let sectors = ["Tiktok LyovT", "Tiktok LyovT", "Tiktok LyovT", "Tiktok LyovT", "Tiktok LyovT", "Tiktok LyovT"];
        let sectorColors = sectors.map(() => `hsl(${Math.random() * 360}, 65%, 50%)`);

        function drawWheel() {
            const numSectors = sectors.length;
            const arc = (2 * Math.PI) / numSectors;
            ctx.clearRect(0, 0, 500, 500);
            let fontSize = numSectors > 30 ? 10 : 16;

            sectors.forEach((label, i) => {
                const angle = i * arc;
                ctx.beginPath(); ctx.fillStyle = sectorColors[i];
                ctx.moveTo(250, 250); ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.fill(); ctx.save();
                ctx.translate(250, 250); ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "#fff";
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.fillText(label.substring(0,14), 240, fontSize/3); ctx.restore();
            });
        }

        function updateList() {
            itemListElement.innerHTML = '';
            sectors.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${item}</span> <button class="del-btn" onclick="removeItem(${index})">X</button>`;
                itemListElement.appendChild(li);
            });
            drawWheel();
        }

        function addItem() {
            const input = document.getElementById('new-item').value.trim();
            if (!input) return;
            const match = input.match(/(.+)\s(\d+)\.$/);
            if (match) {
                for (let i = 0; i < parseInt(match[2]); i++) {
                    sectors.push(match[1].trim());
                    sectorColors.push(`hsl(${Math.random() * 360}, 65%, 50%)`);
                }
            } else {
                sectors.push(input); sectorColors.push(`hsl(${Math.random() * 360}, 65%, 50%)`);
            }
            document.getElementById('new-item').value = ''; updateList();
        }

        function removeItem(i) { if(sectors.length > 1) { sectors.splice(i,1); sectorColors.splice(i,1); updateList(); } }

        function shuffleItems() {
            for (let i = sectors.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [sectors[i], sectors[j]] = [sectors[j], sectors[i]];
                [sectorColors[i], sectorColors[j]] = [sectorColors[j], sectorColors[i]];
            }
            updateList();
        }

        let isSpinning = false;
        spinBtn.onclick = () => {
            if (isSpinning) return;
            isSpinning = true;
            resultText.innerText = "Պտտվում է...";
            wheelWrapper.classList.remove('idle-spin');
            wheelWrapper.style.transition = "none";
            wheelWrapper.style.transform = "rotate(0deg)";
            spinSound.play();
            setTimeout(() => {
                const extraRotation = 3600 + Math.floor(Math.random() * 360);
                wheelWrapper.style.transition = "transform 10s cubic-bezier(0.1, 0, 0.1, 1)";
                wheelWrapper.style.transform = `rotate(${extraRotation}deg)`;
            }, 50);
            setTimeout(() => {
                isSpinning = false;
                const style = window.getComputedStyle(wheelWrapper);
                const matrix = new WebKitCSSMatrix(style.transform);
                const angle = (Math.atan2(matrix.b, matrix.a) * (180/Math.PI) + 360) % 360;
                const winningIndex = Math.floor((360 - angle + 270) % 360 / (360 / sectors.length));
                let winner = sectors[winningIndex];
                resultText.innerText = "Հաղթող՝ " + winner;
                setTimeout(() => startEggGame(winner), 1500);
            }, 10050);
        };

        let canPick = false;
        async function startEggGame(name) {
            document.getElementById('egg-overlay').style.display = 'flex';
            document.getElementById('egg-winner-name').innerText = name;
            document.getElementById('egg-status').innerText = "Ուշադիր նայիր...";
            const eggs = [document.getElementById('egg-0'), document.getElementById('egg-1')];
            canPick = false;
            document.getElementById('close-egg').style.display = 'none';

            // Նախապես ցույց տալ 50 և 100
            eggs[0].innerText = "50"; eggs[1].innerText = "100";
            eggs.forEach(e => e.classList.add('pulse'));
            await new Promise(r => setTimeout(r, 2000));
            
            eggs.forEach(e => { e.classList.remove('pulse'); e.innerText = "?"; e.classList.add('shuffling'); });
            document.getElementById('egg-status').innerText = "Խառնվում է...";

            setTimeout(() => {
                eggs.forEach(e => e.classList.remove('shuffling'));
                document.getElementById('egg-status').innerText = "ԸՆՏՐԻՐ ՄԵԿԸ";
                canPick = true;
            }, 4000);
        }

        function pickEgg(idx) {
            if (!canPick) return; canPick = false;
            const eggs = [document.getElementById('egg-0'), document.getElementById('egg-1')];
            
            // 60% շանս -> 50, 40% շանս -> 100
            let rand = Math.random() * 100;
            let winValue = (rand < 70) ? 50 : 100;
            let otherValue = (winValue === 50) ? 100 : 50;

            eggs[idx].innerText = winValue;
            eggs[idx].classList.add('open');
            
            // Մյուս ձվիկի արժեքը
            const otherIdx = idx === 0 ? 1 : 0;
            eggs[otherIdx].innerText = otherValue;

            document.getElementById('egg-status').innerText = "Շնորհավոր! Ստացար " + winValue;
            document.getElementById('close-egg').style.display = 'block';
        }

        function closeEggGame() {
            document.getElementById('egg-overlay').style.display = 'none';
            document.querySelectorAll('.egg').forEach(e => { e.classList.remove('open'); e.innerText = "?"; });
            wheelWrapper.classList.add('idle-spin');
        }

        function startTimer() {
            let total = (parseInt(document.getElementById('min').value)||0)*60 + (parseInt(document.getElementById('sec').value)||0);
            if (total <= 0) return;
            const timer = setInterval(() => {
                total--;
                document.getElementById('display').innerText = `${Math.floor(total/60).toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`;
                if (total <= 0) { clearInterval(timer); alert("Ժամանակն ավարտվեց"); }
            }, 1000);
        }
        function resetTimer() { location.reload(); }
        updateList();
    </script>
</body>
</html>
