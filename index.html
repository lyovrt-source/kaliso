<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyovT Neon Wheel - Prize Pool</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: radial-gradient(#10101a, #000);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            box-sizing: border-box;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .screen-zoom-active {
            transform: scale(1.8) translateY(10vh);
            transform-origin: center 120px;
        }

        /* Թայմեր */
        .timer-container {
            background: rgba(20, 20, 30, 0.6);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
            transition: opacity 0.5s;
        }

        .timer-display {
            font-size: 32px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #f1c40f;
        }

        /* Կոճակների դասավորությունը մեկ տողով */
        .timer-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap; /* Թույլ չի տալիս անցնել հաջորդ տող */
            gap: 5px;
        }

        .timer-inputs input {
            width: 40px;
            padding: 5px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .timer-btn {
            background: #f1c40f;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 35px;
        }
        
        .timer-btn:active { transform: scale(0.9); }

        /* Մրցանակային ֆոնդ */
        #prize-pool-container {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(241, 196, 15, 0.6);
            padding: 15px 40px;
            border-radius: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 250px;
        }

        #prize-label {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        #prize-amount-box {
            font-size: 28px;
            font-weight: 900;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.8);
        }

        #result-text {
            font-size: 24px;
            margin-bottom: 20px;
            color: #fff;
            height: 35px;
            font-weight: bold;
            text-shadow: 0 0 15px #fff;
            text-align: center;
        }

        .wheel-section {
            position: relative;
            width: 355px;
            height: 355px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 30px;
            background: #ff4757;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
        }

        #wheel-wrapper {
            width: 345px;
            height: 345px;
            position: relative;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid #f1c40f;
            box-shadow: 0 0 20px #f1c40f;
        }

        .idle-spin { animation: idleRotate 20s linear infinite; }
        @keyframes idleRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #wheel { width: 100%; height: 100%; border-radius: 50%; }

        #spin-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55px; height: 55px;
            background: #f1c40f;
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            z-index: 35;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            border: 2px solid #fff;
        }

        .menu-container {
            background: rgba(20, 20, 30, 0.6);
            padding: 15px;
            border-radius: 15px;
            width: 95%;
            max-width: 380px;
            box-sizing: border-box;
            transition: opacity 0.5s;
        }

        .zoom-hide { opacity: 0; pointer-events: none; }

        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 5px; border: none; background: rgba(0,0,0,0.4); color: white; }
        .add-btn { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .shuffle-btn { background: #3498db; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; width: 100%; }
        
        .item-list { max-height: 150px; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .item-list li {
            background: rgba(255,255,255,0.05);
            margin-bottom: 5px; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="timer-container" id="timer-box">
        <div class="timer-display" id="display">00:00</div>
        <div class="timer-inputs">
            <input type="number" id="min" placeholder="Ր">
            <span>:</span>
            <input type="number" id="sec" placeholder="Վ">
            <button class="timer-btn" onclick="startTimer()">ՍԿՍԵԼ</button>
            <button class="timer-btn" style="background:#95a5a6" onclick="resetTimer()">R</button>
            <button class="timer-btn" style="background:#e67e22; color:white; font-size: 16px;" onclick="setKopekRate()">🪙</button>
        </div>
    </div>

    <div id="prize-pool-container">
        <div id="prize-label">Մրցանակային ֆոնդ</div>
        <div id="prize-amount-box"><span id="prize-number">0</span> կոպեկ</div>
    </div>

    <div id="result-text"></div>

    <div class="wheel-section">
        <div class="arrow"></div>
        <div id="spin-btn">GO</div>
        <div id="wheel-wrapper" class="idle-spin">
            <canvas id="wheel" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="menu-container" id="menu-box">
        <div class="input-group">
            <input type="text" id="new-item" placeholder="Անուն կամ 'Անուն 5.'">
            <button class="add-btn" onclick="addItem()">+</button>
        </div>
        <button class="shuffle-btn" onclick="shuffleItems()">🔀 ԽԱՌՆԵԼ ՑՈՒՑԱԿԸ</button>
        <ul class="item-list" id="item-list"></ul>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const wheelWrapper = document.getElementById('wheel-wrapper');
        const spinBtn = document.getElementById('spin-btn');
        const resultText = document.getElementById('result-text');
        const itemListElement = document.getElementById('item-list');
        const menuBox = document.getElementById('menu-box');
        const timerBox = document.getElementById('timer-box');
        const prizeNumberEl = document.getElementById('prize-number');

        let kopekRate = 2; 
        let sectors = [];
        let sectorColors = [];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
        function playWin() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function setKopekRate() {
            const val = prompt("Քանի՞ կոպեկ ավելանա ամեն անունից:", kopekRate);
            if (val !== null && !isNaN(val)) {
                kopekRate = parseFloat(val);
                updatePrizePool();
            }
        }

        function getRandomColor() {
            const hue = Math.floor(Math.random() * 360);
            return `hsl(${hue}, 70%, 50%)`;
        }

        function updatePrizePool() {
            const totalKopeks = sectors.length * kopekRate;
            prizeNumberEl.innerText = Number.isInteger(totalKopeks) ? totalKopeks : totalKopeks.toFixed(2);
        }

        function drawWheel() {
            if(sectors.length === 0) {
                ctx.clearRect(0, 0, 500, 500);
                return;
            }
            const numSectors = sectors.length;
            const arc = (2 * Math.PI) / numSectors;
            ctx.clearRect(0, 0, 500, 500);
            let fontSize = numSectors > 30 ? 10 : 16;
            sectors.forEach((label, i) => {
                const angle = i * arc;
                ctx.beginPath(); ctx.fillStyle = sectorColors[i];
                ctx.moveTo(250, 250); ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.fill(); ctx.save();
                ctx.translate(250, 250); ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "#fff";
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.fillText(label.substring(0,14), 240, fontSize/3); ctx.restore();
            });
        }

        function updateList() {
            itemListElement.innerHTML = '';
            sectors.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${item}</span> <button class="del-btn" style="background:#ff4757; color:white; border:none; padding:4px 10px; border-radius:4px; cursor:pointer;" onclick="removeItem(${index})">X</button>`;
                itemListElement.appendChild(li);
            });
            drawWheel();
            updatePrizePool();
        }

        function addItem() {
            const input = document.getElementById('new-item').value.trim();
            if (!input) return;
            const match = input.match(/(.+)\s(\d+)\.$/);
            if (match) {
                const count = parseInt(match[2]);
                const name = match[1].trim();
                for (let i = 0; i < count; i++) {
                    sectors.unshift(name);
                    sectorColors.unshift(getRandomColor());
                }
            } else {
                sectors.unshift(input); 
                sectorColors.unshift(getRandomColor());
            }
            document.getElementById('new-item').value = ''; 
            updateList();
        }

        function removeItem(i) {
            sectors.splice(i,1); 
            sectorColors.splice(i,1); 
            updateList();
        }

        function shuffleItems() {
            for (let i = sectors.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [sectors[i], sectors[j]] = [sectors[j], sectors[i]];
                [sectorColors[i], sectorColors[j]] = [sectorColors[j], sectorColors[i]];
            }
            updateList();
        }

        let isSpinning = false;
        let currentRotation = 0;

        spinBtn.onclick = () => {
            if (isSpinning || sectors.length === 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            isSpinning = true;
            resultText.innerText = "Պտտվում է...";
            document.body.classList.remove('screen-zoom-active');
            menuBox.classList.remove('zoom-hide');
            timerBox.classList.remove('zoom-hide');
            wheelWrapper.classList.remove('idle-spin');
            
            const totalTime = 30000; 
            const extraRotation = 10800 + Math.floor(Math.random() * 360);
            const startTime = performance.now();
            let lastTickAngle = 0;
            let zoomTriggered = false;

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / totalTime, 1);
                const ease = 1 - Math.pow(1 - progress, 2);
                currentRotation = (extraRotation * ease);
                wheelWrapper.style.transform = `rotate(${currentRotation}deg)`;

                if (Math.abs(currentRotation - lastTickAngle) >= (360 / sectors.length)) {
                    playTick(); lastTickAngle = currentRotation;
                }

                if (elapsed >= 24000 && !zoomTriggered) {
                    zoomTriggered = true;
                    document.body.classList.add('screen-zoom-active');
                    menuBox.classList.add('zoom-hide');
                    timerBox.classList.add('zoom-hide');
                }

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    playWin();
                    document.body.classList.remove('screen-zoom-active');
                    menuBox.classList.remove('zoom-hide');
                    timerBox.classList.remove('zoom-hide');

                    const angle = currentRotation % 360;
                    const winningIndex = Math.floor((360 - angle + 270) % 360 / (360 / sectors.length));
                    let winner = sectors[winningIndex];
                    resultText.innerText = "Հաղթող՝ " + winner;
                    
                    setTimeout(() => { wheelWrapper.classList.add('idle-spin'); }, 2000);
                }
            }
            requestAnimationFrame(animate);
        };

        function startTimer() {
            let total = (parseInt(document.getElementById('min').value)||0)*60 + (parseInt(document.getElementById('sec').value)||0);
            if (total <= 0) return;
            const timer = setInterval(() => {
                total--;
                document.getElementById('display').innerText = `${Math.floor(total/60).toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`;
                if (total <= 0) { clearInterval(timer); alert("Ժամանակն ավարտվեց"); }
            }, 1000);
        }
        function resetTimer() { location.reload(); }
        
        updateList();
    </script>
</body>
</html>
