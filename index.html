<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyovT Neon Wheel - Pro</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: radial-gradient(#10101a, #000);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .timer-container {
            background: rgba(20, 20, 30, 0.6);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }

        .timer-display {
            font-size: 32px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #f1c40f;
        }

        .timer-inputs input {
            width: 45px;
            padding: 5px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .timer-btn {
            background: #f1c40f;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
        }

        #result-text {
            font-size: 26px;
            margin-bottom: 25px;
            color: #fff;
            height: 35px;
            font-weight: bold;
            text-shadow: 0 0 15px #fff;
            text-align: center;
        }

        .wheel-section {
            position: relative;
            width: 360px;
            height: 360px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 35px;
            background: #ff4757;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
            filter: drop-shadow(0 0 8px #ff4757);
        }

        #wheel-wrapper {
            width: 350px;
            height: 350px;
            position: relative;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 6px solid #f1c40f;
            box-shadow: 0 0 25px #f1c40f, inset 0 0 20px #f1c40f;
        }

        .idle-spin {
            animation: idleRotate 20s linear infinite;
        }

        @keyframes idleRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        #spin-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 65px; height: 65px;
            background: #f1c40f;
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            z-index: 35;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px #f1c40f;
            font-size: 16px;
            border: 2px solid #fff;
        }

        /* Նվերների բաժինը անիվից հետո */
        .gift-prices {
            background: rgba(20, 20, 30, 0.8);
            width: 100%;
            max-width: 380px;
            border: 2px solid #00f2ea;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 242, 234, 0.3);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            box-sizing: border-box;
        }

        .gift-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            border-left: 3px solid #00f2ea;
            font-size: 13px;
        }
        .gift-name { color: #00f2ea; font-weight: bold; cursor: pointer; }
        .gift-val { color: #f1c40f; cursor: pointer; }

        .menu-container {
            background: rgba(20, 20, 30, 0.6);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 5px; border: none; background: rgba(0,0,0,0.3); color: white; }
        .add-btn { background: #2ecc71; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        
        .item-list { max-height: 200px; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .item-list li {
            background: rgba(255,255,255,0.05);
            margin-bottom: 5px; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 6px;
        }
        .del-btn { background: #ff4757; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="timer-display" id="display">00:00</div>
        <div class="timer-inputs">
            <input type="number" id="min" placeholder="Ր"> :
            <input type="number" id="sec" placeholder="Վ">
            <button class="timer-btn" onclick="startTimer()">ՍԿՍԵԼ</button>
            <button class="timer-btn" style="background:#95a5a6" onclick="resetTimer()">R</button>
        </div>
    </div>

    <div id="result-text">Tiktok LyovT</div>

    <div class="wheel-section">
        <div class="arrow"></div>
        <div id="spin-btn">GO</div>
        <div id="wheel-wrapper" class="idle-spin">
            <canvas id="wheel" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="gift-prices" id="gift-list">
        </div>

    <div class="menu-container">
        <div class="input-group">
            <input type="text" id="new-item" placeholder="Անուն կամ 'Անուն 5.'">
            <button class="add-btn" onclick="addItem()">+</button>
        </div>
        <ul class="item-list" id="item-list"></ul>
    </div>

    <audio id="spin-sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const wheelWrapper = document.getElementById('wheel-wrapper');
        const spinBtn = document.getElementById('spin-btn');
        const resultText = document.getElementById('result-text');
        const itemListElement = document.getElementById('item-list');
        const spinSound = document.getElementById('spin-sound');

        let sectors = ["Tiktok LyovT", "Tiktok LyovT", "Tiktok LyovT", "Tiktok LyovT", "Tiktok LyovT", "Tiktok LyovT"];
        let sectorColors = sectors.map(() => `hsl(${Math.random() * 360}, 65%, 50%)`);

        // Նվերների Համակարգ
        const defaultGifts = [
            { name: "🌹 Rose", val: "1 տոմս" },
            { name: "🍦 Cone", val: "1 տոմս" },
            { name: "💎 Multi.", val: "5 տոմս" },
            { name: "🍩 Donut", val: "10 տոմս" },
            { name: "🎈 Balloon", val: "20 տոմս" },
            { name: "🦁 Lion", val: "100 տոմս" }
        ];

        function loadGifts() {
            const saved = localStorage.getItem('lyov_live_gifts');
            const gifts = saved ? JSON.parse(saved) : defaultGifts;
            const container = document.getElementById('gift-list');
            container.innerHTML = '';
            gifts.forEach((g, i) => {
                const div = document.createElement('div');
                div.className = 'gift-item';
                div.innerHTML = `<span class="gift-name" ondblclick="editGift(${i}, 'name')">${g.name}</span>
                                 <span class="gift-val" ondblclick="editGift(${i}, 'val')">${g.val}</span>`;
                container.appendChild(div);
            });
        }

        function editGift(index, field) {
            const saved = JSON.parse(localStorage.getItem('lyov_live_gifts')) || defaultGifts;
            const newVal = prompt("Մուտքագրեք նորը:", saved[index][field]);
            if (newVal !== null && newVal.trim() !== "") {
                saved[index][field] = newVal;
                localStorage.setItem('lyov_live_gifts', JSON.stringify(saved));
                loadGifts();
            }
        }

        function drawWheel() {
            const numSectors = sectors.length;
            const arc = (2 * Math.PI) / numSectors;
            ctx.clearRect(0, 0, 500, 500);
            sectors.forEach((label, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = sectorColors[i];
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.lineTo(250, 250);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.stroke();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px Arial";
                ctx.fillText(label, 230, 8);
                ctx.restore();
            });
        }

        function updateList() {
            itemListElement.innerHTML = '';
            [...sectors].reverse().forEach((item, index) => {
                const realIndex = sectors.length - 1 - index;
                const li = document.createElement('li');
                li.innerHTML = `<span>${item}</span> <button class="del-btn" onclick="removeItem(${realIndex})">X</button>`;
                itemListElement.appendChild(li);
            });
            drawWheel();
        }

        function addItem() {
            const input = document.getElementById('new-item').value.trim();
            if (!input) return;
            const match = input.match(/(.+)\s(\d+)\.$/);
            if (match) {
                const name = match[1].trim();
                const count = parseInt(match[2]);
                for (let i = 0; i < count; i++) {
                    sectors.push(name);
                    sectorColors.push(`hsl(${Math.random() * 360}, 65%, 50%)`);
                }
            } else {
                sectors.push(input);
                sectorColors.push(`hsl(${Math.random() * 360}, 65%, 50%)`);
            }
            document.getElementById('new-item').value = '';
            updateList();
        }

        function removeItem(index) {
            if (sectors.length > 2) {
                sectors.splice(index, 1);
                sectorColors.splice(index, 1);
                updateList();
            }
        }

        let isSpinning = false;
        let currentRotation = 0;

        spinBtn.onclick = () => {
            if (isSpinning) return;
            isSpinning = true;
            resultText.innerText = "Հաջողություն...";
            const style = window.getComputedStyle(wheelWrapper);
            const matrix = new WebKitCSSMatrix(style.transform);
            const initialAngle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
            wheelWrapper.classList.remove('idle-spin');
            wheelWrapper.style.transition = "none";
            wheelWrapper.style.transform = `rotate(${initialAngle}deg)`;
            spinSound.currentTime = 0;
            spinSound.play();
            setTimeout(() => {
                const extraRotation = 360 * 15 + Math.floor(Math.random() * 360);
                currentRotation = initialAngle + extraRotation;
                wheelWrapper.style.transition = "transform 30s cubic-bezier(0.1, 0, 0.1, 1)";
                wheelWrapper.style.transform = `rotate(${currentRotation}deg)`;
            }, 50);
            setTimeout(() => {
                isSpinning = false;
                let finalRotation = currentRotation % 360;
                if (finalRotation < 0) finalRotation += 360;
                const arcDegree = 360 / sectors.length;
                let winningIndex = Math.floor((360 - finalRotation + 270) % 360 / arcDegree);
                resultText.innerText = "Հաղթող՝ " + sectors[winningIndex];
                setTimeout(() => {
                    if (!isSpinning) {
                        wheelWrapper.style.transition = "none";
                        wheelWrapper.classList.add('idle-spin');
                    }
                }, 2000);
            }, 30000);
        };

        let timerInterval;
        function startTimer() {
            clearInterval(timerInterval);
            let m = parseInt(document.getElementById('min').value) || 0;
            let s = parseInt(document.getElementById('sec').value) || 0;
            let total = m * 60 + s;
            if (total <= 0) return;
            timerInterval = setInterval(() => {
                total--;
                document.getElementById('display').innerText = 
                    `${Math.floor(total/60).toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`;
                if (total <= 0) { clearInterval(timerInterval); alert("Ժամանակն ավարտվեց"); }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            document.getElementById('display').innerText = "00:00";
            document.getElementById('min').value = "";
            document.getElementById('sec').value = "";
        }

        loadGifts();
        updateList();
    </script>
</body>
</html>
